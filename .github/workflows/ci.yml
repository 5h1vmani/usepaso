name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-js:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        working-directory: packages/paso-js
        run: npm ci
      - name: Type check
        working-directory: packages/paso-js
        run: npx tsc --noEmit
      - name: Run tests
        working-directory: packages/paso-js
        run: npm test

  test-py:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        working-directory: packages/paso-py
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: packages/paso-py
        run: pytest tests/ -v

  lint-js:
    name: Lint & Format (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: packages/paso-js
        run: npm ci
      - name: Lint
        working-directory: packages/paso-js
        run: npx eslint src/
      - name: Format check
        working-directory: packages/paso-js
        run: npx prettier --check "src/**/*.ts" "tests/**/*.ts"
