name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  version-check:
    name: Validate tag matches source versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check versions match tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          JS_VERSION=$(node -p "require('./packages/paso-js/package.json').version")
          PY_VERSION=$(python3 -c "
          import re
          text = open('packages/paso-py/pyproject.toml').read()
          print(re.search(r'version\s*=\s*\"(.+?)\"', text).group(1))
          ")

          echo "Tag:     $TAG"
          echo "JS SDK:  $JS_VERSION"
          echo "PY SDK:  $PY_VERSION"

          FAIL=0
          if [ "$JS_VERSION" != "$TAG" ]; then
            echo "::error::JS version ($JS_VERSION) does not match tag ($TAG)"
            FAIL=1
          fi
          if [ "$PY_VERSION" != "$TAG" ]; then
            echo "::error::PY version ($PY_VERSION) does not match tag ($TAG)"
            FAIL=1
          fi
          if [ "$JS_VERSION" != "$PY_VERSION" ]; then
            echo "::error::JS ($JS_VERSION) and PY ($PY_VERSION) versions differ"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "All versions match: $TAG"

  test-js:
    name: Test Node.js
    needs: [version-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: packages/paso-js
        run: npm ci
      - name: Build
        working-directory: packages/paso-js
        run: npm run build
      - name: Lint
        working-directory: packages/paso-js
        run: npx eslint src/
      - name: Test
        working-directory: packages/paso-js
        run: npm test
      - name: Validate examples
        run: |
          for dir in examples/*/; do
            if [ -f "$dir/usepaso.yaml" ]; then
              node packages/paso-js/dist/cli.js validate -f "$dir/usepaso.yaml"
            fi
          done

  test-py:
    name: Test Python
    needs: [version-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: packages/paso-py
        run: pip install -e ".[dev]"
      - name: Type check
        working-directory: packages/paso-py
        run: python -m mypy usepaso/ --ignore-missing-imports
      - name: Test
        working-directory: packages/paso-py
        run: pytest tests/ -v

  publish-npm:
    name: Publish to npm
    needs: [test-js, test-py]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        working-directory: packages/paso-js
        run: npm ci
      - name: Build
        working-directory: packages/paso-js
        run: npm run build
      - name: Publish to npm
        working-directory: packages/paso-js
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: [test-js, test-py]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build package
        working-directory: packages/paso-py
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/paso-py/dist/

  github-release:
    name: Create GitHub Release
    needs: [publish-npm, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
